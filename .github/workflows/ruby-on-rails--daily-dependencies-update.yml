# This workflow updates gem dependencies and the RBS collection every day and
# opens a pull request when any dependency changes are detected.

name: Ruby on Rails - Daily Dependencies Update

on:
  schedule:
    # 0:00 JST every day
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update_gem_dependencies:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-ruby-on-rails
      - name: Update Gem Dependencies
        working-directory: ./ruby-on-rails
        env:
          BUNDLE_FROZEN: "false"
        run: |
          gem update --system
          gem install bundler
          bundle update --bundler
          bundle update --all
          bundle exec rbs collection update
      - name: Mirror Updated Versions to Gemfile
        working-directory: ./ruby-on-rails
        run: |
          ruby <<'RUBY'
          versions = File.read('Gemfile.lock').scan(/^    (\S+) \((\d+(?:\.\d+)*)\)$/).to_h
          gemfile = File.read('Gemfile').gsub(/^(\s*gem '([^']+)', )'~> [^']+'/) do
            versions[$2] ? "#{$1}'~> #{versions[$2]}'" : $~[0]
          end
          File.write('Gemfile', gemfile)
          RUBY
      - name: Generate Pull Request Description
        env:
          BODY_PATH: ${{ runner.temp }}/pr_body.md
        run: |
          {
            cat <<'OVERVIEW'
          ## 1. Overview

          This pull request was created automatically by the Ruby on Rails - Daily Dependencies Update workflow.
          It upgrades RubyGems and Bundler, updates every gem to the latest version allowed by the Gemfile, updates the RBS collection, and mirrors the updated versions to the Gemfile:

          ~~~console
          gem update --system
          gem install bundler
          bundle update --bundler
          bundle update --all
          bundle exec rbs collection update
          ~~~

          ## 2. Key Changes & Differences
          OVERVIEW
            echo
            bash .github/scripts/dependency_report.sh gem ruby-on-rails/Gemfile.lock ruby-on-rails/Gemfile Gems
            cat <<SUMMARY

          ## 3. Summary

          All gem dependencies in ruby-on-rails/Gemfile, ruby-on-rails/Gemfile.lock, and the RBS collection (rbs_collection.lock.yaml) are now up to date.
          Please make sure that all CI workflows pass before merging this pull request.

          ## 4. References

          - [Ruby on Rails - Daily Dependencies Update workflow run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)
          - [bundle update documentation](https://bundler.io/man/bundle-update.1.html)
          - [RBS collection documentation](https://github.com/ruby/rbs/blob/master/docs/collection.md)
          SUMMARY
          } > "$BODY_PATH"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          sign-commits: true
          branch: hayat01sh1da/daily/ruby-on-rails/update-gem-dependencies
          delete-branch: true
          add-paths: |
            ruby-on-rails/Gemfile
            ruby-on-rails/Gemfile.lock
            ruby-on-rails/rbs_collection.lock.yaml
          commit-message: "[Daily][Ruby on Rails] Update Gem Dependencies"
          title: "[Daily][Ruby on Rails] Update Gem Dependencies"
          body-path: ${{ runner.temp }}/pr_body.md
          reviewers: hayat01sh1da
          assignees: hayat01sh1da
