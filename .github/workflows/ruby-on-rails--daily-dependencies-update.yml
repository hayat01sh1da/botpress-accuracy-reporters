# This workflow updates gem dependencies and the RBS collection every day and
# opens a pull request when any dependency changes are detected.

name: Ruby on Rails - Daily Dependencies Update

on:
  schedule:
    # 0:00 JST every day
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
      - name: Update Gem Dependencies
        working-directory: ./ruby-on-rails
        env:
          BUNDLE_FROZEN: "false"
        run: |
          gem update --system
          gem install bundler
          bundle update --all
          bundle exec rbs collection update
      - name: Generate Pull Request Description
        env:
          BODY_PATH: ${{ runner.temp }}/pr_body.md
        run: |
          ROWS=$(git diff --unified=0 -- ruby-on-rails/Gemfile.lock \
            | grep -E '^[+-] {4}[^ ]+ \([0-9]' \
            | sed -E 's/^(.) +/\1 /; s/[()]//g' \
            | awk '{ if ($1 == "-") before[$2] = $3; else after[$2] = $3 }
              END {
                for (name in after) {
                  if (name in before) {
                    if (before[name] != after[name]) print "|" name " |" before[name] " |" after[name] " |Updated |"
                    delete before[name]
                  } else {
                    print "|" name " |- |" after[name] " |Added |"
                  }
                }
                for (name in before) print "|" name " |" before[name] " |- |Removed |"
              }' \
            | sort)
          if [ -z "$ROWS" ]; then ROWS='| | | |No dependency changes detected |'; fi
          cat > "$BODY_PATH" <<EOF
          ## 1. Overview

          This pull request was created automatically by the Ruby on Rails - Daily Dependencies Update workflow.
          It upgrades RubyGems and Bundler, updates every gem to the latest version allowed by the Gemfile, and updates the RBS collection:

          ~~~console
          gem update --system
          gem install bundler
          bundle update --all
          bundle exec rbs collection update
          ~~~

          ## 2. Key Changes & Differences

          |Gems |Before |After |Changes & Differences |
          |:-|:-|:-|:-|
          $ROWS

          ## 3. Summary

          All gem dependencies in ruby-on-rails/Gemfile.lock and the RBS collection (rbs_collection.lock.yaml) are now up to date.
          Please make sure that all CI workflows pass before merging this pull request.

          ## 4. References

          - [Ruby on Rails - Daily Dependencies Update workflow run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)
          - [bundle update documentation](https://bundler.io/man/bundle-update.1.html)
          - [RBS collection documentation](https://github.com/ruby/rbs/blob/master/docs/collection.md)
          EOF
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: daily/ruby-on-rails-dependency-updates
          delete-branch: true
          commit-message: "[Daily][Ruby on Rails] Update Gem dependencies"
          title: "[Daily][Ruby on Rails] Update Gem dependencies"
          body-path: ${{ runner.temp }}/pr_body.md
          reviewers: hayat01sh1da
          assignees: github-actions[bot]
